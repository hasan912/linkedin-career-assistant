<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #14181C;
      color: #F4F2ED;
      margin: 0;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #C9C5BA;
      margin: 0 0 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #C9C5BA;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #1D2329;
      border: 1px solid rgba(244,242,237,0.12);
      border-radius: 6px;
      padding: 8px 10px;
      color: #F4F2ED;
      font-size: 13px;
    }
    button {
      width: 100%;
      margin-top: 14px;
      background: #4E8C82;
      color: #14181C;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #6FB3A8; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #C9C5BA;
      min-height: 16px;
    }
    #optionsLink {
      display: block;
      margin-top: 12px;
      font-size: 11px;
      color: #6FB3A8;
      text-decoration: none;
      text-align: center;
    }
    /* Success overlay: green checkmark that draws itself in, shown for 2s */
    #successOverlay {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #14181C;
      z-index: 10;
    }
    #successOverlay.visible { display: flex; }
    #successOverlay .circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #22C55E;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #successOverlay svg path {
      stroke-dasharray: 36;
      stroke-dashoffset: 36;
      animation: draw-check 0.4s 0.25s ease-out forwards;
    }
    #successOverlay .label {
      font-size: 13px;
      font-weight: 600;
      color: #6FB3A8;
      animation: fade-in 0.4s 0.4s both;
    }
    @keyframes pop-in {
      from { transform: scale(0.4); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>Save Job to Career Console</h1>

  <label>Job title</label>
  <input id="jobTitle" />

  <label>Company</label>
  <input id="company" placeholder="(optional)" />

  <label>URL</label>
  <input id="jobUrl" readonly />

  <button id="saveBtn">Save to Career Console</button>
  <div id="status"></div>
  <a href="#" id="optionsLink">Set up API token →</a>

  <div id="successOverlay" role="status" aria-live="polite">
    <div class="circle">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#14181C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 12.5l5 5L20 7" />
      </svg>
    </div>
    <div class="label">Saved to Career Console</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
